<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UL Library Events</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  background: transparent;
  font-family: Arial, sans-serif;
  overflow: hidden;
  color: #111827;
}
.wrap {
  width: 100%;
  height: 100%;
  background: #ffffff;
  border-radius: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.head {
  padding: 12px 16px;
  color: #ffffff;
  background: #003B5C;
  border-bottom: 4px solid #00843D;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex: 0 0 auto;
  gap: 10px;
}
.head .title {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: #ffffff;
  white-space: nowrap;
}
.head .updated {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #ffffff;
  opacity: 0.85;
  text-align: right;
  line-height: 1.3;
  white-space: nowrap;
}
.head .updated .ts {
  display: block;
  font-size: 12px;
  font-weight: 800;
  opacity: 1;
  letter-spacing: 0.3px;
}
.body {
  flex: 1 1 auto;
  overflow-y: auto;
  padding: 12px;
  background: #f0f2f4;
}
.body::-webkit-scrollbar { width: 6px; }
.body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
.status {
  text-align: center;
  color: #64748b;
  font-size: 13px;
  padding: 20px 14px;
  line-height: 1.5;
}
.empty {
  text-align: center;
  padding: 24px 16px;
  color: #475569;
}
.empty .big {
  font-size: 14px;
  font-weight: 800;
  color: #003B5C;
  margin-bottom: 6px;
}
.empty .sub {
  font-size: 12px;
  color: #64748b;
}
#out { font-size: 13px; color: #111827; }
#out > h1, #out > h2, #out > h3, #out > h4 { display: none; }
#out .s-lc-w-att,
#out [class*="attend"],
#out [class*="register"],
#out [class*="seats"],
#out [class*="capacity"] { display: none; }
#out a[href*="event/"],
#out a[href*="event.php"],
#out a[href*="calendar"],
#out [class*="view-details"],
#out [class*="view_details"],
#out [class*="view-cal"],
#out [class*="view_cal"],
#out [class*="more-events"],
#out [class*="all-events"],
#out [class*="footer"],
#out [class*="actions"] { display: none; }
#out ul, #out ol { list-style: none; padding: 0; margin: 0; }
#out li {
  background: #ffffff;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
  border-left: 4px solid #00843D;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  line-height: 1.4;
  list-style: none;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
#out li > *:first-child {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #003B5C;
  color: #ffffff;
  border-radius: 8px;
  min-width: 56px;
  padding: 8px 6px;
  font-weight: 700;
  font-size: 12px;
  line-height: 1.2;
  text-align: center;
}
#out li > *:first-child * { color: #ffffff; }
#out a {
  color: #00843D;
  text-decoration: none;
  font-weight: 800;
  font-size: 13px;
  line-height: 1.35;
  display: block;
}
#out img { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <span class="title">Upcoming Events</span>
    <span class="updated">Last Updated<span class="ts" id="ts">--</span></span>
  </div>
  <div class="body">
    <div id="out"><div class="status">Loading...</div></div>
  </div>
</div>
<script>
function pad(n){return n<10?"0"+n:""+n;}
function nowStr(){
  var d=new Date();
  var h=d.getHours();
  var m=pad(d.getMinutes());
  var a=h>=12?"PM":"AM";
  h=h%12; if(h===0)h=12;
  return h+":"+m+" "+a;
}
function showEmpty(){
  document.getElementById("out").innerHTML=
    '<div class="empty">'+
      '<div class="big">No upcoming events</div>'+
      '<div class="sub">Check back soon.</div>'+
    '</div>';
}
function hasEvents(html){
  // Consider it empty if there are no list items and no event-like markup
  if(!html || !html.replace(/\s+/g,"").length) return false;
  var lower=html.toLowerCase();
  if(lower.indexOf("<li")!==-1) return true;
  if(lower.indexOf("s-lc-")!==-1) return true;
  if(lower.indexOf("event")!==-1 && lower.indexOf("href")!==-1) return true;
  return false;
}
function load(){
  var x=new XMLHttpRequest();
  // F7W calendar — cid can be the calendar slug
  var u="https://ul-ctl.libcal.com/api_events.php?m=upc&cid=9328&audience=&c=&d=&tags=&l=6&tar=0&bs=1&simple=agenda&_="+Date.now();
  x.open("GET",u,true);
  x.onreadystatechange=function(){
    if(x.readyState===4){
      if(x.status>=200 && x.status<300){
        var html=x.responseText.replace(/<scr/gi,"<!--scr").replace(/<\/scr/gi,"<!--/scr");
        if(hasEvents(html)){
          document.getElementById("out").innerHTML=html;
        } else {
          showEmpty();
        }
        document.getElementById("ts").innerHTML=" "+nowStr();
      } else {
        document.getElementById("out").innerHTML='<div class="status">Unable to load events.</div>';
      }
    }
  };
  x.send();
}
load();
setInterval(load,600000);
</script>
</body>
</html>
